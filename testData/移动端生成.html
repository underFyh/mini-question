<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双轨渲染 - 移动端预览与离屏打印 Demo</title>
    <style>
        body {
            background-color: #333; /* 模拟暗色桌面背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* 1. 模拟手机屏幕外壳 */
        .mobile-container {
            width: 375px;
            height: 667px;
            background-color: #f7f7f7;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 8px solid #000;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 手机顶栏模拟 */
        .status-bar { height: 44px; background: #fff; text-align: center; line-height: 54px; font-weight: bold; font-size: 16px; border-bottom: 1px solid #eee; }

        /* 移动端预览区 (DOM 渲染) */
        .preview-scroll {
            flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px;
        }
        .task-card {
            background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .task-title { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 12px; border-left: 4px solid #07c160; padding-left: 8px;}
        .task-content { font-size: 16px; color: #666; line-height: 1.6; }

        /* 底部固定操作栏 */
        .bottom-bar {
            position: absolute; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95);
            padding: 16px 20px 30px; backdrop-filter: blur(10px); border-top: 1px solid #eee;
        }
        .print-btn {
            width: 100%; padding: 14px; background: #07c160; color: white; border: none; border-radius: 24px;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .print-btn:active { background: #06ad56; transform: scale(0.98); }
        .print-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* 2. 核心黑科技：离屏 Canvas (完全在视口之外) */
        .offscreen-canvas {
            position: fixed; top: -9999px; left: -9999px; width: 794px; height: 1123px;
        }

        /* 3. 模拟微信 wx.previewImage 或系统打印弹窗 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; flex-direction: column;
        }
        .modal img { width: auto; height: 80vh; background: #fff; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .modal-actions { margin-top: 20px; display: flex; gap: 16px; }
        .modal-btn { padding: 12px 24px; background: #fff; border: none; border-radius: 20px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .modal-btn.primary { background: #07c160; color: #fff; }

    </style>
</head>
<body>

<div class="mobile-container">
    <div class="status-bar">今日微练习预览</div>

    <div class="preview-scroll" id="domPreview">
    </div>

    <div class="bottom-bar">
        <button class="print-btn" id="generateBtn" onclick="handleGenerate()">排版并生成 A4 (0/100%)</button>
    </div>
</div>

<canvas id="offscreenCanvas" class="offscreen-canvas" width="1588" height="2246"></canvas>

<div class="modal" id="imageModal">
    <img id="resultImage" src="" alt="生成的A4练习纸">
    <div class="modal-actions">
        <button class="modal-btn" onclick="closeModal()">取消</button>
        <button class="modal-btn primary" onclick="mockSystemPrint()">调起打印机</button>
    </div>
</div>

<script>
    // 1. 模拟从云函数获取的统一 JSON 数据源
    const mockData = {
        date: "2026年3月3日",
        trace: [{ word: "春", pinyin: "chūn" }, { word: "花", pinyin: "huā" }],
        reading: "春风轻轻吹，花园里开满了五颜六色的花朵。我今天真开心！"
    };

    // ==========================================
    // 模块 A: 移动端 DOM 渲染 (适合小屏幕阅读)
    // ==========================================
    function renderMobileUI() {
        const container = document.getElementById('domPreview');
        let html = `
                <div class="task-card">
                    <div class="task-title">一、 每日新字</div>
                    <div class="task-content">
                        ${mockData.trace.map(item => `字: <b>${item.word}</b> (拼音: ${item.pinyin})`).join('<br>')}
                    </div>
                </div>
                <div class="task-card">
                    <div class="task-title">二、 亲子大声读</div>
                    <div class="task-content">${mockData.reading}</div>
                </div>
                <p style="text-align:center; color:#999; font-size: 12px; margin-top:20px;">
                    💡 提示：点击下方按钮，系统将自动排版为 A4 格式
                </p>
            `;
        container.innerHTML = html;
    }

    // ==========================================
    // 模块 B: 离屏 Canvas 渲染引擎 (A4 级排版)
    // ==========================================
    function renderOffscreenCanvas() {
        return new Promise((resolve) => {
            const canvas = document.getElementById('offscreenCanvas');
            const ctx = canvas.getContext('2d');

            // 重置并处理高清缩放
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.scale(2, 2);

            // --- 极简的模拟绘制过程 ---
            // 画背景
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 794, 1123);

            // 页面标题
            ctx.font = 'bold 36px sans-serif'; ctx.fillStyle = '#333'; ctx.textAlign = 'center';
            ctx.fillText('🌟 每日微练习 (A4 打印版) 🌟', 794 / 2, 80);

            // 绘制描红区 (简单示意)
            ctx.font = 'bold 24px sans-serif'; ctx.textAlign = 'left';
            ctx.fillText('一、 每日新字', 60, 180);

            let currentY = 240;
            mockData.trace.forEach((item, index) => {
                // 画一个简单的红框模拟田字格
                ctx.strokeStyle = '#ff9999'; ctx.lineWidth = 2;
                ctx.strokeRect(60, currentY + index * 100, 80, 80);
                // 填字
                ctx.font = '60px "Kaiti", "楷体", serif'; ctx.fillStyle = '#333'; ctx.textBaseline = 'top';
                ctx.fillText(item.word, 70, currentY + index * 100 + 10);
            });

            // 绘制阅读区
            currentY += 250;
            ctx.font = 'bold 24px sans-serif'; ctx.textBaseline = 'alphabetic';
            ctx.fillText('二、 亲子大声读', 60, currentY);
            ctx.font = '22px "Kaiti", "楷体", serif';
            ctx.fillText(mockData.reading, 60, currentY + 60);

            // 底部签名
            ctx.font = '20px sans-serif'; ctx.fillStyle = '#666'; ctx.textAlign = 'right';
            ctx.fillText('🏅 家长签字：______________', 794 - 60, 1060);

            // 模拟一点耗时，展示进度条效果
            setTimeout(() => {
                // 核心 API：将 Canvas 导出为 Base64 图片数据
                const dataURL = canvas.toDataURL('image/jpeg', 0.9);
                resolve(dataURL);
            }, 800);
        });
    }

    // ==========================================
    // 模块 C: 交互控制器
    // ==========================================
    async function handleGenerate() {
        const btn = document.getElementById('generateBtn');
        btn.disabled = true;
        btn.innerText = '正在排版绘制中...';

        // 1. 触发离屏渲染引擎
        const base64Image = await renderOffscreenCanvas();

        // 2. 模拟微信小程序 wx.showShareImageMenu 的表现
        btn.innerText = '生成成功！';
        setTimeout(() => {
            document.getElementById('resultImage').src = base64Image;
            document.getElementById('imageModal').style.display = 'flex';

            // 恢复按钮状态
            btn.disabled = false;
            btn.innerText = '排版并生成 A4 (0/100%)';
        }, 300);
    }

    function closeModal() {
        document.getElementById('imageModal').style.display = 'none';
    }

    function mockSystemPrint() {
        alert('在真实小程序中，这里会调起系统的打印或分享菜单！');
        // 如果是在 PC 浏览器测试，可以直接用新窗口打开并打印
        // const win = window.open('');
        // win.document.write(`<img src="${document.getElementById('resultImage').src}" style="width:100%;" onload="window.print();window.close();" />`);
    }

    // 初始化：渲染手机UI
    window.onload = renderMobileUI;

</script>
</body>
</html>
