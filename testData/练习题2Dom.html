<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纯DOM数据驱动版 - 每日微练习</title>
    <style>
        /* ==================================================
           1. 基础页面与打印重置
           ================================================== */
        body {
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 20px;
            color: #333;
        }

        .controls {
            margin-bottom: 20px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background-color: #07c160;
            color: white;
            border: none;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(7, 193, 96, 0.2);
        }

        /* 强制打印背景色和矢量图形 */
        * {
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
            box-sizing: border-box;
        }

        @media print {
            .controls {
                display: none !important;
            }

            body {
                background: none;
                padding: 0;
                margin: 0;
                display: block;
            }

            .paper-container {
                box-shadow: none !important;
                width: 100% !important;
                margin: 0 !important;
            }
        }

        @page {
            size: A4;
            margin: 0;
            /* 抹除默认的页眉页脚 */
        }

        /* ==================================================
           2. A4 纸张排版容器
           ================================================== */
        .paper-container {
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 794px;
            /* A4 纸宽度 */
            min-height: 1123px;
            /* A4 纸最小高度，内容多了会自动撑开 */
            padding: 30px;
            /* 统一的页面边距，取代 Canvas 里的 startX 和 currentY */
            position: relative;
        }

        /* --- 页眉 --- */
        .header {
            text-align: center;
            position: relative;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 36px;
            margin: 0 0 10px 0;
        }

        .header .date {
            position: absolute;
            right: 0;
            bottom: 0;
            color: #666;
            font-size: 16px;
        }

        /* --- 题目区块通用样式 --- */
        .section {
            margin-bottom: 30px;
            /* 防止单个题目被硬生生切在两页上 */
            page-break-inside: avoid;
        }

        .section-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        /* ==================================================
           3. 核心组件：纯 CSS 渲染的田字格
           ================================================== */
        .grid-group {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-right: 20px;
            margin-bottom: 20px;
        }

        .pinyin {
            font-family: Arial, sans-serif;
            font-size: 20px;
            height: 24px;
            margin-bottom: 4px;
        }

        .tianzige {
            width: 70px;
            height: 70px;
            border: 2px solid #ff9999;
            position: relative;
            /* 居中里面的文字 */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 利用伪元素画虚线十字，绝对清晰！ */
        .tianzige::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            border-top: 1px dashed #ff9999;
            transform: translateY(-50%);
            z-index: 1;
        }

        .tianzige::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 1px;
            height: 100%;
            border-left: 1px dashed #ff9999;
            transform: translateX(-50%);
            z-index: 1;
        }

        .char {
            font-family: "Kaiti", "楷体", serif;
            font-size: 56px;
            z-index: 2;
            /* 确保文字压在虚线上面 */
            line-height: 1;
        }

        .char.watermark {
            color: rgba(0, 0, 0, 0.15);
            /* 描红水印颜色 */
        }

        /* ==================================================
           4. 各题型特有布局
           ================================================== */
        /* 第一题：描红 */
        .task-trace .trace-row {
            display: flex;
            margin-bottom: 10px;
        }

        /* 第二题：看拼音写词 (两组隔开) */
        .task-dictation {
            display: flex;
            gap: 60px;
            /* 两组词语之间的间距 */
        }

        /* 第三题：连连看 */
        .task-match {
            display: flex;
            width: 300px;
            margin-left: 40px;
            justify-content: space-between;
        }

        .match-col {
            display: flex;
            flex-direction: column;
            gap: 25px;
            /* 上下间距 */
        }

        .match-item {
            display: flex;
            align-items: center;
            font-family: "Kaiti", "楷体", serif;
            font-size: 24px;
        }

        .match-col.left .match-item {
            justify-content: flex-end;
        }

        .match-col.right .match-item {
            justify-content: flex-start;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #333;
            border-radius: 50%;
            display: inline-block;
            margin: 0 15px;
        }

        /* 第四题：阅读 */
        .task-reading {
            font-family: "Kaiti", "楷体", serif;
            font-size: 24px;
            line-height: 1.8;
            padding: 0 20px;
        }
    </style>
</head>

<body>

    <div class="controls">
        <button onclick="window.print()">🖨️ 打印今日挑战卷</button>
    </div>

    <div class="paper-container" id="paper"></div>

    <script>
        // 1. 模拟后端返回的数据结构
        const mockData = {
            tittle: "每日通关微练习",
            date: "2026年3月3日",
            tasks: {
                trace: [
                    { word: "春", pinyin: "chūn" },
                    { word: "花", pinyin: "huā" }
                ],
                dictation: [
                    { words: ["开", "心"], pinyins: ["kāi", "xīn"] },
                    { words: ["云", "朵"], pinyins: ["yún", "duǒ"] }
                ],
                match: {
                    left: ["大", "多", "高"],
                    right: ["低", "小", "少"]
                },
                reading: "春风轻轻吹，花园里开满了五颜六色的花朵。我今天真开心！"
            }
        };

        // 2. 渲染函数（利用模板字符串将数据映射为 DOM）
        function renderPaper(data) {
            const paper = document.getElementById('paper');

            let html = `
            <div class="header">
                <h1>🌟 每日通关微练习 🌟</h1>
                <div class="date">挑战日期：${data.date}</div>
            </div>
        `;

            // 第一题：描红
            html += `
            <div class="section">
                <div class="section-title">一、 每日新字（先描红，再自己写哦）</div>
                <div class="task-trace">
                    ${data.tasks.trace.map(item => `
                        <div class="trace-row">
                            <div class="grid-group">
                                <div class="pinyin">${item.pinyin}</div>
                                <div class="tianzige"><span class="char">${item.word}</span></div>
                            </div>
                            <div class="grid-group">
                                <div class="pinyin"></div>
                                <div class="tianzige"><span class="char watermark">${item.word}</span></div>
                            </div>
                            <div class="grid-group"><div class="pinyin"></div><div class="tianzige"></div></div>
                            <div class="grid-group"><div class="pinyin"></div><div class="tianzige"></div></div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;

            // 第二题：看拼音写字
            html += `
            <div class="section">
                <div class="section-title">二、 拼音魔法（看拼音，写出正确的字）</div>
                <div class="task-dictation">
                    ${data.tasks.dictation.map(group => `
                        <div class="dictation-group">
                            ${group.pinyins.map(pinyin => `
                                <div class="grid-group">
                                    <div class="pinyin">${pinyin}</div>
                                    <div class="tianzige"></div>
                                </div>
                            `).join('')}
                        </div>
                    `).join('')}
                </div>
            </div>
        `;

            // 第三题：连连看
            html += `
            <div class="section">
                <div class="section-title">三、 趣味连连看（找找反义词，用线连起来）</div>
                <div class="task-match">
                    <div class="match-col left">
                        ${data.tasks.match.left.map(text => `
                            <div class="match-item"><span>${text}</span><span class="dot"></span></div>
                        `).join('')}
                    </div>
                    <div class="match-col right">
                        ${data.tasks.match.right.map(text => `
                            <div class="match-item"><span class="dot"></span><span>${text}</span></div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;

            // 第四题：亲子阅读
            html += `
            <div class="section">
                <div class="section-title">四、 亲子大声读（读给爸爸妈妈听）</div>
                <div class="task-reading">
                    ${data.tasks.reading}
                </div>
            </div>
        `;

            // 将生成的 HTML 注入容器
            paper.innerHTML = html;

            // 这一步是为了适配后端 Puppeteer 截图使用的标记
            const readyDiv = document.createElement('div');
            readyDiv.id = 'render-ready';
            document.body.appendChild(readyDiv);
        }

        // 页面加载完成后执行渲染
        window.onload = () => renderPaper(mockData);
    </script>
</body>

</html>
